name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      MONGO_URI: mongodb://127.0.0.1:27017/asd_ci_test
      JWT_SECRET: ci-jwt-secret-change-in-production
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install server dependencies
        working-directory: server
        run: npm ci
      - name: Run server tests
        working-directory: server
        run: npm test

  client-test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install client dependencies
        working-directory: client
        run: npm ci
      - name: Unit tests
        working-directory: client
        run: npm test
      - name: Production build
        working-directory: client
        env:
          VITE_API_BASE_URL: http://127.0.0.1:4000/api
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [backend-test, client-test-and-build]
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      MONGO_URI: mongodb://127.0.0.1:27017/asd_e2e_ci
      JWT_SECRET: ci-jwt-secret-change-in-production
      NODE_ENV: test
      CI: "true"
      E2E_API_BASE_URL: http://127.0.0.1:4000
      VITE_API_BASE_URL: http://127.0.0.1:4000/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install server
        working-directory: server
        run: npm ci
      - name: Install client
        working-directory: client
        run: npm ci
      - name: Build client (API URL baked for preview)
        working-directory: client
        run: npm run build
      - name: Install Playwright browsers
        working-directory: client
        run: npx playwright install chromium --with-deps
      - name: Run Playwright E2E
        working-directory: client
        run: npm run test:e2e
